---
name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Validate PR Title
        uses: goeselt/bumpkin@b7b8dc09745b98e0fc23e11e1349bf63f470c65c # v1.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Tests
        run: npm test

      - name: Pedant
        uses: goeselt/pedant@dbb8852f9f6cbb107f989688b1d5d654aa44354b # v1.0.1
