---
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: app
        name: Generate App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # bumpkin needs full history to find the previous release tag
          token: ${{ steps.app.outputs.token }}

      - id: bumpkin
        name: Resolve Version
        uses: ./
        with:
          initial-version: '1.0.0'

      - name: Run Tests
        if: steps.bumpkin.outputs.release-needed == 'true'
        run: npm test

      - name: Ship
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: goeselt/shipit@8aad8bac87ba6757859e510db9d08bb49adb30fa # v1.0.1
        with:
          release-tag: ${{ steps.bumpkin.outputs.release-tag }}
          major-tag: ${{ steps.bumpkin.outputs.major-tag }}
          minor-tag: ${{ steps.bumpkin.outputs.minor-tag }}
          github-token: ${{ steps.app.outputs.token }}
          git-user-name: ${{ vars.RELEASE_SIGNING_USER }}
          git-user-email: ${{ vars.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}
