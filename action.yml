---
name: 'Intent Release'
description: 'GitHub Action that validates PR release intent and resolves the next semantic version from Conventional Commit history.'
author: 'goeselt'

branding:
  icon: git-pull-request
  color: green

inputs:
  github-token:
    description: 'PR mode only. GitHub token used to list PR commits and post the PR comment. Defaults to github.token.'
    required: false
    default: ${{ github.token }}
  pr-comment:
    description: 'PR mode only. Comment policy: failures posts only when action is needed; true/always posts every run; false/never disables comments.'
    required: false
    default: 'failures'
  release-scope:
    description: 'Tag namespace for scoped releases. Tags become <scope>/<prefix><version>. Also used by PR release context.'
    required: false
    default: ''
  tag-prefix:
    description: 'Prefix for version tags, for example v for v1.2.3. Also used by PR release context.'
    required: false
    default: 'v'
  initial-version:
    description: 'Push mode only. Version used when no matching release tag exists.'
    required: false
    default: '0.0.0'
  release-paths:
    description: 'Push mode only. Optional newline-separated paths that are allowed to contribute to version resolution.'
    required: false
    default: ''
  release-ignore-paths:
    description: 'Push mode only. Optional newline-separated paths that are ignored during version resolution.'
    required: false
    default: ''
  reserved-tags:
    description: 'Push mode only. Optional full tag names that must not be proposed, separated by newlines, commas, or whitespace.'
    required: false
    default: ''

outputs:
  release-needed:
    description: 'Whether the PR title or commit history requires a release.'
  bump-level:
    description: 'Semantic version bump level: major, minor, patch, or none.'
  current-version:
    description: 'Current semantic version without tag prefix.'
  next-version:
    description: 'Next semantic version without tag prefix.'
  previous-tag:
    description: 'Latest matching release tag, if one exists.'
  release-tag:
    description: 'Full release tag, for example v1.2.3 or my-tool/v1.2.3.'
  major-tag:
    description: 'Floating major tag, for example v1 or my-tool/v1.'
  minor-tag:
    description: 'Floating minor tag, for example v1.2 or my-tool/v1.2.'
  major-version:
    description: 'Floating major version without tag prefix or release scope, for example 1.'
  minor-version:
    description: 'Floating minor version without tag prefix or release scope, for example 1.2.'

runs:
  using: node24
  main: src/index.js
